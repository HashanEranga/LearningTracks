<section class="greeting">
    <h3>{{ heading() }}</h3>

    @if(names().length > 0){
        <p>Hello, there are {{ names().length }} people here:</p>
    }
    @else {
        <p>Nobody here yet.</p>
    }

    <ul>
        @for(name of names(); track name){
            <li>{{name | uppercase}}</li>
        }
    </ul>
</section>
